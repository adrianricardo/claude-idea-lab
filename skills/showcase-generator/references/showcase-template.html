<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1A1A2E;
    --bg-surface: #1E1E34;
    --bg-sidebar: #16162A;
    --bg-hover: rgba(255, 255, 255, 0.04);
    --bg-active: rgba(255, 255, 255, 0.07);
    --text: #E8E8EC;
    --text-secondary: #8888A0;
    --text-tertiary: #5C5C74;
    --text-muted: #44445A;
    --border: rgba(255, 255, 255, 0.06);
    --border-light: rgba(255, 255, 255, 0.03);
    --accent: #D4A020;
    --accent-light: rgba(212, 160, 32, 0.12);
    --accent-hover: #E0B030;
    --green: #2D9F6F;
    --green-light: rgba(45, 159, 111, 0.12);
    --amber: #D4A020;
    --amber-light: rgba(212, 160, 32, 0.12);
    --purple: #7C5CFC;
    --purple-light: rgba(124, 92, 252, 0.12);
    --coral: #E8553A;
    --coral-light: rgba(232, 85, 58, 0.12);
    --blue: #4A8FE7;
    --blue-light: rgba(74, 143, 231, 0.12);
    --radius: 8px;
    --radius-sm: 5px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { font-size: 15px; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 16px 14px;
    flex-shrink: 0;
  }

  .sidebar-header h1 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }

  .sidebar-header h1 .dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sidebar-header .subtitle {
    font-size: 0.73rem;
    color: var(--text-tertiary);
    margin-top: 3px;
    padding-left: 16px;
  }

  .search-box {
    margin-top: 12px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px 7px 30px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.8rem;
    outline: none;
    transition: border-color var(--transition);
  }

  .search-box input::placeholder { color: var(--text-muted); }
  .search-box input:focus { border-color: var(--accent); }

  .search-box .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.75rem;
    pointer-events: none;
  }

  /* ---- SIDEBAR LIST ---- */
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0 12px;
  }

  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .stage-group { margin-bottom: 2px; }

  .stage-group-header {
    padding: 14px 16px 5px;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .stage-group-header .stage-count {
    font-size: 0.62rem;
    color: var(--text-muted);
    opacity: 0.7;
  }

  .idea-item {
    padding: 6px 12px;
    margin: 1px 8px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.12s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .idea-item:hover { background: var(--bg-hover); }

  .idea-item.active {
    background: var(--bg-active);
  }

  .idea-item .idea-icon {
    font-size: 0.8rem;
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }

  .idea-item .idea-name {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    transition: color 0.12s;
  }

  .idea-item:hover .idea-name { color: var(--text); }
  .idea-item.active .idea-name { color: var(--text); }

  .idea-item .has-demo {
    font-size: 0.58rem;
    font-weight: 600;
    color: var(--accent);
    flex-shrink: 0;
    opacity: 0.7;
    letter-spacing: 0.03em;
  }

  /* ---- MAIN PANEL ---- */
  .main-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }

  .main-panel::-webkit-scrollbar { width: 4px; }
  .main-panel::-webkit-scrollbar-track { background: transparent; }
  .main-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
  }

  .empty-state .big-icon { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.6; }
  .empty-state p { font-size: 0.9rem; max-width: 320px; line-height: 1.6; }

  /* ---- IDEA DETAIL ---- */
  .idea-detail {
    max-width: 760px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 6px;
  }

  .detail-title {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    color: var(--text);
  }

  .stage-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 14px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 6px;
    text-transform: capitalize;
  }

  .stage-seedling { background: var(--amber-light); color: var(--amber); }
  .stage-exploring { background: var(--blue-light); color: var(--blue); }
  .stage-spec { background: var(--purple-light); color: var(--purple); }
  .stage-mock { background: var(--purple-light); color: var(--purple); }
  .stage-building { background: var(--coral-light); color: var(--coral); }
  .stage-ready-to-build { background: var(--coral-light); color: var(--coral); }
  .stage-launched { background: var(--green-light); color: var(--green); }
  .stage-sprout { background: var(--green-light); color: var(--green); }
  .stage-sapling { background: var(--green-light); color: var(--green); }
  .stage-tree { background: var(--amber-light); color: var(--amber); }
  .stage-archived { background: rgba(107, 114, 128, 0.12); color: #6b7280; }

  .detail-summary {
    font-size: 0.95rem;
    line-height: 1.65;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  .detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 24px;
  }

  .tag-pill {
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-tertiary);
  }

  /* ---- SECTIONS ---- */
  .section {
    margin-bottom: 24px;
  }

  .section-header {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .demo-iframe-wrap {
    margin-bottom: 10px;
  }

  .demo-iframe-wrap iframe {
    width: 100%;
    height: 480px;
    border: none;
    display: block;
  }

  .demo-placeholder {
    padding: 36px 24px;
    text-align: center;
    color: var(--text-muted);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .demo-placeholder .placeholder-icon { font-size: 1.8rem; margin-bottom: 10px; opacity: 0.5; }

  .cmd-block {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.78rem;
    color: var(--accent);
    margin-top: 8px;
    cursor: pointer;
    transition: border-color var(--transition);
    user-select: all;
  }

  .cmd-block:hover { border-color: var(--accent); }

  .action-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all var(--transition);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  .action-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 0.78rem;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 800px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      height: auto;
      max-height: 50vh;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .main-panel { padding: 20px 16px; }
    .detail-title { font-size: 1.3rem; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1><span class="dot"></span> Idea Lab</h1>
    <div class="subtitle" id="idea-subtitle"></div>
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search ideas..." autocomplete="off" />
    </div>
  </div>
  <div class="sidebar-list" id="sidebar-list"></div>
</aside>

<main class="main-panel" id="main-panel">
  <div class="empty-state" id="empty-state">
    <div class="big-icon">&#128161;</div>
    <p>Select an idea from the sidebar, or run <code style="color:var(--accent)">/new-idea</code> in Claude Code to capture one.</p>
  </div>
  <div class="idea-detail hidden" id="idea-detail"></div>
</main>

<div class="toast" id="toast">Copied!</div>

<script>
const IDEAS = /*__IDEAS_DATA__*/[];

// ---- Stage config ----
const STAGES = {
  "building":       { icon: "\u{1F528}", label: "Building",       order: 0 },
  "ready-to-build": { icon: "\u{1F3AF}", label: "Ready to Build", order: 1 },
  "spec":           { icon: "\u{1F4CB}", label: "Spec",            order: 2 },
  "mock":           { icon: "\u{1F3A8}", label: "Mock",            order: 3 },
  "exploring":      { icon: "\u{1F50D}", label: "Exploring",       order: 4 },
  "seedling":       { icon: "\u{1F331}", label: "Seedling",        order: 5 },
  "launched":       { icon: "\u{1F680}", label: "Launched",        order: 6 },
  "sprout":         { icon: "\u{1F33F}", label: "Sprout",          order: 7 },
  "sapling":        { icon: "\u{1F333}", label: "Sapling",         order: 8 },
  "tree":           { icon: "\u{1F3DB}\uFE0F", label: "Tree",      order: 9 },
  "archived":       { icon: "\u{1F4E6}", label: "Archived",        order: 10 },
};

function stageInfo(s) {
  return STAGES[s] || STAGES["seedling"];
}

// ---- DOM refs ----
const sidebarList = document.getElementById("sidebar-list");
const mainPanel = document.getElementById("main-panel");
const emptyState = document.getElementById("empty-state");
const ideaDetail = document.getElementById("idea-detail");
const searchInput = document.getElementById("search-input");
const subtitleEl = document.getElementById("idea-subtitle");
const toast = document.getElementById("toast");

let activeId = null;

// Subtitle
const stageCounts = {};
IDEAS.forEach(i => { stageCounts[i.stage] = (stageCounts[i.stage] || 0) + 1; });
const breakdown = Object.entries(stageCounts)
  .sort((a, b) => (STAGES[a[0]]?.order ?? 99) - (STAGES[b[0]]?.order ?? 99))
  .map(([s, c]) => c + " " + (STAGES[s]?.label.toLowerCase() || s))
  .join(", ");
subtitleEl.textContent = IDEAS.length + " ideas" + (breakdown ? " \u2014 " + breakdown : "");

// ---- Render sidebar ----
function renderList() {
  const q = searchInput.value.toLowerCase().trim();
  const filtered = IDEAS.filter(idea => {
    if (q) {
      const haystack = (idea.title + " " + idea.summary + " " + (idea.tags || []).join(" ")).toLowerCase();
      return haystack.includes(q);
    }
    return true;
  });

  // Group by stage
  const groups = {};
  filtered.forEach(idea => {
    if (!groups[idea.stage]) groups[idea.stage] = [];
    groups[idea.stage].push(idea);
  });

  const sortedStages = Object.keys(groups).sort((a, b) => {
    return (STAGES[a]?.order ?? 99) - (STAGES[b]?.order ?? 99);
  });

  sidebarList.innerHTML = "";

  if (sortedStages.length === 0) {
    sidebarList.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:0.8rem;">No ideas match.</div>';
    return;
  }

  sortedStages.forEach(stage => {
    const info = stageInfo(stage);
    const ideas = groups[stage];

    const groupEl = document.createElement("div");
    groupEl.className = "stage-group";

    const header = document.createElement("div");
    header.className = "stage-group-header";
    header.innerHTML = info.label + ' <span class="stage-count">' + ideas.length + '</span>';
    groupEl.appendChild(header);

    ideas.forEach(idea => {
      const item = document.createElement("div");
      item.className = "idea-item" + (idea.id === activeId ? " active" : "");
      item.dataset.id = idea.id;
      item.innerHTML =
        '<span class="idea-icon">' + info.icon + '</span>' +
        '<span class="idea-name">' + escapeHtml(idea.title) + '</span>' +
        (idea.demos && idea.demos.length > 0 ? '<span class="has-demo">DEMO</span>' : '');
      item.addEventListener("click", () => selectIdea(idea.id));
      groupEl.appendChild(item);
    });

    sidebarList.appendChild(groupEl);
  });
}

function selectIdea(id) {
  activeId = id;
  const idea = IDEAS.find(i => i.id === id);
  if (!idea) return;

  sidebarList.querySelectorAll(".idea-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === id);
  });

  emptyState.classList.add("hidden");
  ideaDetail.classList.remove("hidden");

  const info = stageInfo(idea.stage);
  let html = '';

  // Header
  html += '<div class="detail-header">';
  html += '<div><div class="detail-title">' + escapeHtml(idea.title) + '</div></div>';
  html += '<span class="stage-badge stage-' + idea.stage + '">' + info.icon + ' ' + info.label + '</span>';
  html += '</div>';

  // Summary
  html += '<div class="detail-summary">' + escapeHtml(idea.summary) + '</div>';

  // Tags
  if (idea.tags && idea.tags.length > 0) {
    html += '<div class="detail-tags">';
    idea.tags.forEach(t => { html += '<span class="tag-pill">' + escapeHtml(t) + '</span>'; });
    html += '</div>';
  }

  // Demo section
  html += '<div class="section">';
  if (idea.demos && idea.demos.length > 0) {
    html += '<div class="section-header">Demo</div>';
    idea.demos.forEach(demo => {
      const demoPath = "demos/" + demo;
      html += '<div class="card demo-iframe-wrap">';
      html += '<iframe src="' + escapeHtml(demoPath) + '" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe>';
      html += '</div>';
    });
  } else {
    html += '<div class="demo-placeholder">';
    html += '<div class="placeholder-icon">&#128640;</div>';
    html += '<div>No demo yet</div>';
    html += '<div class="cmd-block" onclick="copyCmd(this)" title="Click to copy">/idea-demo ' + escapeHtml(idea.id) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  // Actions
  html += '<div class="section">';
  html += '<div class="section-header">Actions</div>';
  html += '<div class="action-row">';
  html += '<button class="action-btn" onclick="copyCmd(this)" title="Click to copy">/flesh-out ' + escapeHtml(idea.id) + '</button>';
  if (!idea.demos || idea.demos.length === 0) {
    html += '<button class="action-btn" onclick="copyCmd(this)" title="Click to copy">/idea-demo ' + escapeHtml(idea.id) + '</button>';
  }
  html += '</div>';
  html += '</div>';

  ideaDetail.innerHTML = html;
  mainPanel.scrollTop = 0;
}

function copyCmd(el) {
  const text = el.textContent.trim();
  navigator.clipboard.writeText(text).then(() => showToast("Copied: " + text)).catch(() => {});
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove("show"), 1800);
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

searchInput.addEventListener("input", () => renderList());
renderList();
if (IDEAS.length > 0) selectIdea(IDEAS[0].id);
</script>
</body>
</html>
